name: Extract B2 Credentials v2 (Asymmetric)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import GPG public key from repo
        run: |
          gpg --import --batch keys/recepio-backup-public.asc
          gpg --list-keys

      - name: Prepare and encrypt B2 credentials
        run: |
          cat > /tmp/b2-creds.env << 'EOF'
B2_KEY_ID=${{ secrets.B2_ACCOUNT_ID }}
B2_APPLICATION_KEY=${{ secrets.B2_ACCOUNT_KEY }}
B2_BUCKET=recepio-server-backups
B2_PREFIX=recepio/db
EOF
          echo "Credential file created (values redacted):"
          sed 's/=.*/=<REDACTED>/' /tmp/b2-creds.env

          gpg --batch --yes --trust-model always \
            --recipient 5029865814F77EC5 \
            --encrypt --armor \
            --output /tmp/b2-creds.env.asc /tmp/b2-creds.env
          ls -la /tmp/b2-creds.env.asc

      - name: Upload encrypted artifact
        uses: actions/upload-artifact@v4
        with:
          name: b2-creds-asymmetric
          path: /tmp/b2-creds.env.asc
          retention-days: 1

      - name: Cleanup
        run: |
          rm -f /tmp/b2-creds.env /tmp/b2-creds.env.asc
