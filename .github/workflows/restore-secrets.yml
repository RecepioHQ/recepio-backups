name: Deploy Secrets to Server

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP address'
        required: true
        default: '63.181.126.178'
        type: string
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ inputs.server_ip }} >> ~/.ssh/known_hosts

      - name: Create .env file from secrets
        run: |
          cat > /tmp/.env << 'EOF'
          # Recepio Environment Configuration
          # Generated: ${{ github.event.head_commit.timestamp }}
          # Environment: ${{ inputs.environment }}
          # Server: ${{ inputs.server_ip }}

          # Database
          DATABASE_URL=postgresql://recepio:${{ secrets.DB_PASSWORD }}@localhost:5432/recepio
          POSTGRES_APP_PASSWORD=${{ secrets.DB_PASSWORD }}

          # Security
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=60

          # Encryption
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}

          # Backup Encryption
          GPG_PRIVATE_KEY="${{ secrets.GPG_PRIVATE_KEY }}"
          RESTIC_PASSWORD=${{ secrets.RESTIC_PASSWORD }}
          B2_ACCOUNT_ID=${{ secrets.B2_ACCOUNT_ID }}
          B2_ACCOUNT_KEY=${{ secrets.B2_ACCOUNT_KEY }}
          EOF

      - name: Deploy .env to server
        run: |
          # نسخ احتياطي للملف الحالي
          ssh ubuntu@${{ inputs.server_ip }} "mkdir -p /opt/recepio && cp /opt/recepio/.env /opt/recepio/.env.backup.$(date +%Y%m%d%H%M%S) 2>/dev/null || true"

          # رفع الملف الجديد
          scp /tmp/.env ubuntu@${{ inputs.server_ip }}:/opt/recepio/.env

          # تعيين الصلاحيات
          ssh ubuntu@${{ inputs.server_ip }} "chmod 600 /opt/recepio/.env && chown ubuntu:ubuntu /opt/recepio/.env"

      - name: Import GPG key to server
        run: |
          # حفظ مفتاح GPG في ملف مؤقت
          echo "${{ secrets.GPG_PRIVATE_KEY }}" > /tmp/private.key

          # نسخ للسيرفر واستيراده
          scp /tmp/private.key ubuntu@${{ inputs.server_ip }}:/tmp/private.key
          ssh ubuntu@${{ inputs.server_ip }} "gpg --batch --import /tmp/private.key && rm /tmp/private.key"

          # حذف الملف المحلي
          rm -f /tmp/private.key

      - name: Restart services
        run: |
          ssh ubuntu@${{ inputs.server_ip }} << 'ENDSSH'
          # إعادة تشغيل PostgreSQL
          sudo systemctl restart postgresql || docker restart recepio-postgres || true
          sleep 5

          # إعادة تشغيل API
          sudo systemctl restart recepio-api || docker restart recepio-api || true
          sleep 10
          ENDSSH

      - name: Verify services health
        run: |
          echo "=== Verifying services on ${{ inputs.server_ip }} ==="
          
          # Try up to 5 times with 10 second intervals
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            
            # Check API health
            HEALTH=$(ssh ubuntu@${{ inputs.server_ip }} "curl -s http://localhost:3001/api/health 2>/dev/null || echo 'failed'")
            
            if [[ "$HEALTH" == *"ok"* ]] || [[ "$HEALTH" == *"success"* ]]; then
              echo "✅ API is healthy: $HEALTH"
              echo "VERIFIED=true" >> $GITHUB_ENV
              exit 0
            fi
            
            echo "⏳ Waiting... ($HEALTH)"
            sleep 10
          done
          
          echo "::warning::API health check failed after 5 attempts"
          echo "VERIFIED=false" >> $GITHUB_ENV

      - name: Rollback on failure
        if: env.VERIFIED == 'false'
        run: |
          echo "::error::Service verification failed! Rolling back..."
          
          ssh ubuntu@${{ inputs.server_ip }} << 'ENDSSH'
          # Restore from backup if exists
          if [ -f /opt/recepio/.env.backup.* ]; then
            LATEST_BACKUP=$(ls -t /opt/recepio/.env.backup.* | head -1)
            echo "Restoring from: $LATEST_BACKUP"
            cp "$LATEST_BACKUP" /opt/recepio/.env
            docker restart recepio-api recepio-postgres || true
          fi
          ENDSSH
          
          # Create alert issue
          echo "🚨 Rollback performed on ${{ inputs.server_ip }}"

      - name: Final verification
        run: |
          if [ "$VERIFIED" = "true" ]; then
            echo "✅ All services verified successfully!"
          else
            echo "⚠️ Services may need manual intervention"
          fi

      - name: Cleanup
        run: |
          rm -f /tmp/.env /tmp/private.key

      - name: Notify success
        run: |
          echo "✅ Secrets deployed successfully to ${{ inputs.server_ip }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Timestamp: $(date -Iseconds)"

  list-required-secrets:
    runs-on: ubuntu-latest
    needs: deploy-secrets

    steps:
      - name: List required secrets
        run: |
          echo "============================================"
          echo "📋 Required GitHub Secrets for Recepio"
          echo "============================================"
          echo ""
          echo "🔑 Core Secrets (Required):"
          echo "  - GPG_PRIVATE_KEY     (تشفير النسخ الاحتياطية)"
          echo "  - SSH_PRIVATE_KEY     (الوصول للسيرفر)"
          echo "  - DB_PASSWORD          (PostgreSQL)"
          echo "  - JWT_SECRET           (المصادقة)"
          echo "  - ENCRYPTION_KEY       (تشفير البيانات)"
          echo ""
          echo "💾 Backup Secrets:"
          echo "  - RESTIC_PASSWORD"
          echo "  - B2_ACCOUNT_ID"
          echo "  - B2_ACCOUNT_KEY"
          echo ""
          echo "📂 All secrets are stored in:"
          echo "  https://github.com/RecepioHQ/recepio-backups/settings/secrets/actions"
          echo "============================================"
