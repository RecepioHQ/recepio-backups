name: Deploy Secrets to Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 63.181.126.178 >> ~/.ssh/known_hosts

      - name: Create .env file from secrets
        run: |
          cat > /tmp/.env << 'EOF'
          #recepio Environment Configuration
          # Generated: $(date -Iseconds)
          # Environment: ${{ inputs.environment }}

          # Database
          DATABASE_URL=postgresql://recepio:${{ secrets.DB_PASSWORD }}@recepio-postgres:5432/recepio
          POSTGRES_APP_PASSWORD=${{ secrets.DB_PASSWORD }}

          # Security
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=60

          # Encryption
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}

          # Redis
          REDIS_URL=redis://recepio-redis:6379/0

          # AI Services
          CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

          # WhatsApp/Meta
          META_APP_ID=${{ secrets.META_APP_ID }}
          META_APP_SECRET=${{ secrets.META_APP_SECRET }}
          META_WA_ACCESS_TOKEN=${{ secrets.META_WA_ACCESS_TOKEN }}
          META_WA_PHONE_NUMBER_ID=${{ secrets.META_WA_PHONE_NUMBER_ID }}
          WHATSAPP_VERIFY_TOKEN=${{ secrets.WHATSAPP_VERIFY_TOKEN }}

          # Google Calendar
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALENDAR_REDIRECT_URI=${{ secrets.GOOGLE_CALENDAR_REDIRECT_URI }}

          # Payment (PayTabs)
          PAYTABS_PROFILE_ID=${{ secrets.PAYTABS_PROFILE_ID }}
          PAYTABS_SERVER_KEY=${{ secrets.PAYTABS_SERVER_KEY }}

          # Email (Zoho)
          ZOHO_CLIENT_ID=${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET=${{ secrets.ZOHO_CLIENT_SECRET }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}

          # Telegram Bot
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}

          # n8n
          N8N_ENCRYPTION_KEY=${{ secrets.N8N_ENCRYPTION_KEY }}

          # Backup
          BACKUP_ENCRYPTION_KEY=${{ secrets.BACKUP_ENCRYPTION_KEY }}
          B2_KEY_ID=${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY=${{ secrets.B2_APPLICATION_KEY }}

          # Monitoring
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          SLACK_WEBHOOK=${{ secrets.SLACK_WEBHOOK }}
          EOF

      - name: Deploy .env to server
        run: |
          # نسخ احتياطي للملف الحالي
          ssh ubuntu@63.181.126.178 "cp /opt/recepio-api-v2/.env /opt/recepio-api-v2/.env.backup.\$(date +%Y%m%d%H%M%S)"

          # رفع الملف الجديد
          scp /tmp/.env ubuntu@63.181.126.178:/opt/recepio-api-v2/.env

          # تعيين الصلاحيات
          ssh ubuntu@63.181.126.178 "chmod 600 /opt/recepio-api-v2/.env && chown root:root /opt/recepio-api-v2/.env"

      - name: Restart services
        run: |
          ssh ubuntu@63.181.126.178 << 'ENDSSH'
          docker restart recepio-api
          sleep 10
          curl -s http://localhost:3001/healthz || echo "API not responding"
          ENDSSH

      - name: Cleanup
        run: |
          rm -f /tmp/.env

      - name: Notify
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '🔐 Secrets deployed to ${{ inputs.environment }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # قائمة الـ secrets المطلوبة
  list-required-secrets:
    runs-on: ubuntu-latest
    needs: deploy-secrets

    steps:
      - name: List required secrets
        run: |
          echo "============================================"
          echo "Required GitHub Secrets for Recepio"
          echo "============================================"
          echo ""
          echo "Database:"
          echo "  - DB_PASSWORD"
          echo ""
          echo "Security:"
          echo "  - JWT_SECRET"
          echo "  - ENCRYPTION_KEY"
          echo ""
          echo "AI Services:"
          echo "  - CLAUDE_API_KEY"
          echo "  - OPENAI_API_KEY"
          echo ""
          echo "Meta/WhatsApp:"
          echo "  - META_APP_ID"
          echo "  - META_APP_SECRET"
          echo "  - META_WA_ACCESS_TOKEN"
          echo "  - META_WA_PHONE_NUMBER_ID"
          echo "  - WHATSAPP_VERIFY_TOKEN"
          echo ""
          echo "Google:"
          echo "  - GOOGLE_CLIENT_ID"
          echo "  - GOOGLE_CLIENT_SECRET"
          echo "  - GOOGLE_CALENDAR_REDIRECT_URI"
          echo ""
          echo "Payment:"
          echo "  - PAYTABS_PROFILE_ID"
          echo "  - PAYTABS_SERVER_KEY"
          echo ""
          echo "Email:"
          echo "  - ZOHO_CLIENT_ID"
          echo "  - ZOHO_CLIENT_SECRET"
          echo "  - SMTP_PASSWORD"
          echo ""
          echo "Telegram:"
          echo "  - TELEGRAM_BOT_TOKEN"
          echo ""
          echo "Backup:"
          echo "  - GPG_PRIVATE_KEY"
          echo "  - RESTIC_PASSWORD"
          echo "  - B2_ACCOUNT_ID"
          echo "  - B2_ACCOUNT_KEY"
          echo "============================================"
