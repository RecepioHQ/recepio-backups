name: Extract CF Token

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Import GPG public key
        run: |
          gpg --import --batch keys/recepio-backup-public.asc
          gpg --list-keys | grep -i recepio
      - name: Encrypt CF token
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          printf '%s' "$CF_TOKEN" > /tmp/cf-token.txt
          gpg --batch --yes --trust-model always \
            --recipient 5029865814F77EC5 \
            --encrypt --armor \
            --output /tmp/cf-token.asc /tmp/cf-token.txt
          ls -la /tmp/cf-token.asc
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cf-token
          path: /tmp/cf-token.asc
          retention-days: 1
      - name: Cleanup
        if: always()
        run: rm -f /tmp/cf-token.txt /tmp/cf-token.asc
