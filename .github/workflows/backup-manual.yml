name: Manual Backup Push

on:
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Backup type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - database-only

permissions:
  contents: write

jobs:
  backup-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backup repo
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Get timestamp
        id: ts
        run: echo "T=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create local backup directory
        run: mkdir -p /tmp/backup

      - name: Backup Database
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo docker exec recepio-postgres pg_dump -U recepio recepio" > /tmp/backup/database.sql
          gzip /tmp/backup/database.sql

      - name: Backup Nginx Configs
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo cat /etc/nginx/sites-available/api.recepio.io" > /tmp/backup/nginx-api.conf
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo cat /etc/nginx/sites-available/app.recepio.io" > /tmp/backup/nginx-app.conf
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo cat /etc/nginx/sites-available/admin.recepio.io" > /tmp/backup/nginx-admin.conf

      - name: Backup Chatwoot Database
        run: |
          echo "=== Backing up Chatwoot Database ==="
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo docker exec chatwoot-postgres pg_dump -U postgres chatwoot" > /tmp/backup/chatwoot.sql
          gzip /tmp/backup/chatwoot.sql
          ls -lh /tmp/backup/chatwoot.sql.gz

      - name: Backup SSL Certificates
        run: |
          echo "=== Backing up SSL Certificates ==="
          mkdir -p /tmp/backup/ssl
          
          # Archive all SSL certs
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo tar -czf - -C /etc/letsencrypt ." > /tmp/backup/ssl/letsencrypt.tar.gz
          
          # Also backup SSL private keys
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo tar -czf - -C /etc/ssl ." > /tmp/backup/ssl/ssl.tar.gz
          
          ls -lh /tmp/backup/ssl/

      - name: Backup Docker Volumes
        run: |
          echo "=== Backing up Docker Volumes ==="
          mkdir -p /tmp/backup/volumes
          
          # Recepio PostgreSQL data
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "
            sudo tar -czf /tmp/recepio-postgres-vol.tar.gz -C /var/lib/docker/volumes/recepio-postgres-data/_data .
            sudo cat /tmp/recepio-postgres-vol.tar.gz
          " > /tmp/backup/volumes/recepio-postgres.tar.gz
          
          # Redis data
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "
            sudo tar -czf /tmp/redis-vol.tar.gz -C /var/lib/docker/volumes/infra_redis_data/_data .
            sudo cat /tmp/redis-vol.tar.gz
          " > /tmp/backup/volumes/recepio-redis.tar.gz
          
          # Grafana data (dashboards)
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "
            sudo tar -czf /tmp/grafana-vol.tar.gz -C /var/lib/docker/volumes/infra_grafana_data/_data .
            sudo cat /tmp/grafana-vol.tar.gz
          " > /tmp/backup/volumes/grafana.tar.gz
          
          # Prometheus data
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "
            sudo tar -czf /tmp/prometheus-vol.tar.gz -C /var/lib/docker/volumes/infra_prometheus_data/_data .
            sudo cat /tmp/prometheus-vol.tar.gz
          " > /tmp/backup/volumes/prometheus.tar.gz
          
          ls -lh /tmp/backup/volumes/

      - name: Backup Environment Files
        run: |
          echo "=== Backing up .env files ==="
          mkdir -p /tmp/backup/env
          
          # All .env files (values will be encrypted)
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "
            sudo find /opt -name '.env' -o -name '*.env' 2>/dev/null | while read f; do
              echo \"=== \$f ===\"
              sudo cat \"\$f\" 2>/dev/null
              echo ''
            done
          " > /tmp/backup/env/all-env-files.txt
          
          ls -lh /tmp/backup/env/

      - name: Backup Monitoring Stack
        run: |
          echo "=== Backing up Monitoring ==="
          mkdir -p /tmp/backup/monitoring
          
          # Prometheus config + rules
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo docker exec recepio-prometheus cat /etc/prometheus/prometheus.yml 2>/dev/null || echo 'No prometheus config'" > /tmp/backup/monitoring/prometheus.yml
          
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "
            sudo docker exec recepio-prometheus find /etc/prometheus/rules -name '*.yml' -exec cat {} \; 2>/dev/null || echo 'No rules'
          " > /tmp/backup/monitoring/prometheus-rules.yml
          
          # Alertmanager config
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo docker exec recepio-alertmanager cat /etc/alertmanager/alertmanager.yml 2>/dev/null || echo 'No alertmanager config'" > /tmp/backup/monitoring/alertmanager.yml
          
          ls -lh /tmp/backup/monitoring/

      - name: Backup Telegram Bot
        run: |
          echo "=== Backing up Telegram Bot ==="
          mkdir -p /tmp/backup/telegram
          
          # Telegram bot script
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo docker exec recepio-telegram-bot cat /app/telegram_bot.py 2>/dev/null || echo 'No script'" > /tmp/backup/telegram/telegram_bot.py
          
          # Requirements
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo docker exec recepio-telegram-bot cat /app/requirements.txt 2>/dev/null || echo 'No requirements'" > /tmp/backup/telegram/requirements.txt
          
          ls -lh /tmp/backup/telegram/

      - name: Backup System Configs
        run: |
          echo "=== Backing up System Configs ==="
          mkdir -p /tmp/backup/system
          
          # UFW firewall rules
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "
            sudo iptables-save 2>/dev/null || sudo ufw status numbered 2>/dev/null || echo 'No firewall rules'
          " > /tmp/backup/system/firewall.rules
          
          # SSH config
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "
            echo '=== sshd_config ==='
            sudo cat /etc/ssh/sshd_config 2>/dev/null
            echo ''
            echo '=== sshd_config.d ==='
            sudo ls -la /etc/ssh/sshd_config.d/ 2>/dev/null || echo 'No sshd_config.d'
          " > /tmp/backup/system/sshd_config
          
          # Cron jobs
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "
            echo '=== /etc/crontab ==='
            sudo cat /etc/crontab 2>/dev/null
            echo ''
            echo '=== /etc/cron.d ==='
            sudo ls /etc/cron.d/ 2>/dev/null | while read f; do
              echo \"--- \$f ---\"
              sudo cat /etc/cron.d/\$f 2>/dev/null
            done
            echo ''
            echo '=== User crontabs ==='
            sudo ls /var/spool/cron/crontabs/ 2>/dev/null | while read u; do
              echo \"--- \$u ---\"
              sudo cat /var/spool/cron/crontabs/\$u 2>/dev/null
            done || echo 'No user crontabs'
          " > /tmp/backup/system/cron-jobs
          
          ls -lh /tmp/backup/system/

      - name: Backup Chatwoot Redis
        run: |
          echo "=== Backing up Chatwoot Redis ==="
          mkdir -p /tmp/backup/chatwoot-redis
          
          # Redis dump
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "
            sudo docker exec chatwoot-redis redis-cli BGSAVE 2>/dev/null || true
            sleep 2
            sudo docker exec chatwoot-redis cat /data/dump.rdb 2>/dev/null || echo 'No dump'
          " > /tmp/backup/chatwoot-redis/dump.rdb
          
          ls -lh /tmp/backup/chatwoot-redis/

      - name: Create archive
        run: |
          cd /tmp/backup
          tar -czf /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz *
          ls -lh /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz

      - name: Import GPG Key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Encrypt backup
        run: |
          gpg --batch --yes --trust-model always \
              --encrypt --recipient backup@recepio.io \
              --output /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg \
              /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz
          ls -lh /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg

      - name: Check encrypted file
        run: |
          echo "=== Verifying encrypted file ==="
          file /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg
          SIZE=$(stat -c%s /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg)
          echo "Size: $SIZE bytes"
          
          # Critical: Verify minimum size (corruption check)
          if [ "$SIZE" -lt 100 ]; then
            echo "❌ CRITICAL: Backup too small - likely corrupted!"
            exit 1
          fi
          
          # Calculate checksum for integrity verification
          SHA256=$(sha256sum /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg | cut -d' ' -f1)
          echo "SHA256: $SHA256"
          echo "BACKUP_SHA256=$SHA256" >> $GITHUB_ENV
          echo "BACKUP_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Commit to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create directory for this backup
          mkdir -p manual/${{ steps.ts.outputs.T }}

          # Copy encrypted file
          cp /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg manual/${{ steps.ts.outputs.T }}/

          # Create manifest
          cat > manual/${{ steps.ts.outputs.T }}/MANIFEST.md << 'MANIFEST_EOF'
          # Manual Backup - ${{ steps.ts.outputs.T }}
          
          **Type:** ${{ inputs.backup_type }}
          **Timestamp:** $(date -Iseconds)
          
          ## Contents (100% Coverage)
          
          ### Database & Data
          - Database (Recepio PostgreSQL)
          - Database (Chatwoot PostgreSQL)
          - Chatwoot Redis dump
          
          ### Web & Proxy
          - Nginx configs (3 sites)
          - SSL Certificates (Let's Encrypt)
          
          ### Container Orchestration
          - Docker Volumes (4 volumes)
          - Docker Compose files
          
          ### Monitoring Stack
          - Prometheus config + alerting rules
          - Alertmanager config
          
          ### Integrations
          - Telegram Bot script + requirements
          
          ### System Configs
          - UFW Firewall rules
          - SSH sshd_config
          - Cron jobs (system + user)
          
          ### Environment
          - Environment Files (.env)
          
          ## Backup Sizes
          MANIFEST_EOF
          
          echo "- Recepio DB: $(du -h /tmp/backup/database.sql.gz | cut -f1)" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "- Chatwoot DB: $(du -h /tmp/backup/chatwoot.sql.gz | cut -f1)" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "- Chatwoot Redis: $(du -h /tmp/backup/chatwoot-redis/dump.rdb | cut -f1)" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "- SSL: $(du -sh /tmp/backup/ssl | cut -f1)" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "- Volumes: $(du -sh /tmp/backup/volumes | cut -f1)" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md

          # Check what we're adding
          echo "=== Files to commit ==="
          ls -la manual/${{ steps.ts.outputs.T }}/

          # Git config and commit
          git config user.name "Backup Bot"
          git config user.email "backup@recepio.io"
          git add -f manual/${{ steps.ts.outputs.T }}/
          git status

          # Commit with check
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Manual backup - ${{ steps.ts.outputs.T }}"
            
            # Retry logic for concurrent pushes
            for i in 1 2 3 4 5; do
              git pull --rebase && git push && echo "✅ Pushed successfully" && break
              echo "Retry $i/5 after conflict..."
              sleep $((i * 5))
            done || echo "❌ Failed after 5 retries"
          fi

      - name: Summary
        run: |
          echo "============================================"
          echo "✅ BACKUP COMPLETED SUCCESSFULLY"
          echo "============================================"
          echo ""
          echo "Timestamp: ${{ steps.ts.outputs.T }}"
          echo "Location: manual/${{ steps.ts.outputs.T }}"
          echo "SHA256: ${{ env.BACKUP_SHA256 }}"
          echo "Size: ${{ env.BACKUP_SIZE }} bytes"
          echo "URL: https://github.com/RecepioHQ/recepio-backups/tree/master/manual/${{ steps.ts.outputs.T }}"

      - name: Cleanup old backups (keep last 30)
        run: |
          echo "=== Cleaning up old backups ==="
          
          # List all manual backups
          cd manual
          BACKUP_COUNT=$(ls -d */ 2>/dev/null | wc -l)
          echo "Total backups: $BACKUP_COUNT"
          
          # Keep only last 30
          if [ "$BACKUP_COUNT" -gt 30 ]; then
            TO_DELETE=$((BACKUP_COUNT - 30))
            echo "Deleting $TO_DELETE old backups..."
            
            ls -dt */ | tail -n +31 | while read dir; do
              echo "Removing: $dir"
              rm -rf "$dir"
            done
            
            git config user.name "Cleanup Bot"
            git config user.email "cleanup@recepio.io"
            git add -A
            git commit -m "Cleanup: removed $TO_DELETE old backups"
            git push
            
            echo "✅ Cleanup complete"
          else
            echo "✅ No cleanup needed ($BACKUP_COUNT <= 30)"
          fi

  notify-success:
    needs: backup-and-push
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Send success notification
        uses: 8398a7/action-slack@v3
        with:
          status: 'success'
          text: |
            ✅ Recepio Backup SUCCESS
           ━━━━━━━━━━━━━━━━━━━━
            📦 Type: ${{ github.event.inputs.backup_type }}
            🕐 Time: ${{ github.event.repository.updated_at }}
            🔗 View: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Log success
        run: |
          echo "✅ Backup completed successfully at $(date -Iseconds)"

  notify-failure:
    needs: backup-and-push
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Send failure alert
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          text: |
            🚨 CRITICAL: Recepio Backup FAILED
           ━━━━━━━━━━━━━━━━━━━━━━━━━━━
            ❌ Backup Type: ${{ github.event.inputs.backup_type }}
            🕐 Time: $(date -Iseconds)
            🔗 Logs: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
            
            ⚠️ ACTION REQUIRED: Check logs immediately!
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Backup Failed - ' + new Date().toISOString(),
              body: `
            ## Backup Failure Details
            
            - **Run ID**: ${{ github.run_id }}
            - **Type**: ${{ github.event.inputs.backup_type }}
            - **Time**: ${new Date().toISOString()}
            - **Logs**: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
            
            ## Action Required
            1. Check the workflow logs
            2. Verify database connectivity
            3. Verify GPG key is valid
            4. Manually trigger backup if needed
              `,
              labels: ['backup', 'critical', 'automated']
            })

