name: Manual Backup Push

on:
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Backup type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - database-only

permissions:
  contents: write

jobs:
  backup-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backup repo
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Get timestamp
        id: ts
        run: echo "T=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create local backup directory
        run: mkdir -p /tmp/backup

      - name: Backup Database
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo docker exec recepio-postgres pg_dump -U recepio recepio" > /tmp/backup/database.sql
          gzip /tmp/backup/database.sql

      - name: Backup Nginx Configs
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo cat /etc/nginx/sites-available/api.recepio.io" > /tmp/backup/nginx-api.conf
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo cat /etc/nginx/sites-available/app.recepio.io" > /tmp/backup/nginx-app.conf
          ssh -o StrictHostKeyChecking=no ubuntu@63.181.126.178 "sudo cat /etc/nginx/sites-available/admin.recepio.io" > /tmp/backup/nginx-admin.conf

      - name: Create archive
        run: |
          cd /tmp/backup
          tar -czf /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz *
          ls -lh /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz

      - name: Import GPG Key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Encrypt backup
        run: |
          gpg --batch --yes --trust-model always \
              --encrypt --recipient backup@recepio.io \
              --output /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg \
              /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz
          ls -lh /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg

      - name: Check encrypted file
        run: |
          echo "=== Verifying encrypted file ==="
          file /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg
          SIZE=$(stat -c%s /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg)
          echo "Size: $SIZE bytes"
          
          # Critical: Verify minimum size (corruption check)
          if [ "$SIZE" -lt 100 ]; then
            echo "❌ CRITICAL: Backup too small - likely corrupted!"
            exit 1
          fi
          
          # Calculate checksum for integrity verification
          SHA256=$(sha256sum /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg | cut -d' ' -f1)
          echo "SHA256: $SHA256"
          echo "BACKUP_SHA256=$SHA256" >> $GITHUB_ENV
          echo "BACKUP_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Commit to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create directory for this backup
          mkdir -p manual/${{ steps.ts.outputs.T }}

          # Copy encrypted file
          cp /tmp/backup_${{ steps.ts.outputs.T }}.tar.gz.gpg manual/${{ steps.ts.outputs.T }}/

          # Create manifest
          echo "# Manual Backup - ${{ steps.ts.outputs.T }}" > manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "**Type:** ${{ inputs.backup_type }}" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "**Timestamp:** $(date -Iseconds)" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "## Contents" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "- Database (PostgreSQL)" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md
          echo "- Nginx configs (3 sites)" >> manual/${{ steps.ts.outputs.T }}/MANIFEST.md

          # Check what we're adding
          echo "=== Files to commit ==="
          ls -la manual/${{ steps.ts.outputs.T }}/

          # Git config and commit
          git config user.name "Backup Bot"
          git config user.email "backup@recepio.io"
          git add -f manual/${{ steps.ts.outputs.T }}/
          git status

          # Commit with check
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Manual backup - ${{ steps.ts.outputs.T }}"
            
            # Retry logic for concurrent pushes
            for i in 1 2 3 4 5; do
              git pull --rebase && git push && echo "✅ Pushed successfully" && break
              echo "Retry $i/5 after conflict..."
              sleep $((i * 5))
            done || echo "❌ Failed after 5 retries"
          fi

      - name: Summary
        run: |
          echo "============================================"
          echo "✅ BACKUP COMPLETED SUCCESSFULLY"
          echo "============================================"
          echo ""
          echo "Timestamp: ${{ steps.ts.outputs.T }}"
          echo "Location: manual/${{ steps.ts.outputs.T }}"
          echo "SHA256: ${{ env.BACKUP_SHA256 }}"
          echo "Size: ${{ env.BACKUP_SIZE }} bytes"
          echo "URL: https://github.com/RecepioHQ/recepio-backups/tree/master/manual/${{ steps.ts.outputs.T }}"

      - name: Cleanup old backups (keep last 30)
        run: |
          echo "=== Cleaning up old backups ==="
          
          # List all manual backups
          cd manual
          BACKUP_COUNT=$(ls -d */ 2>/dev/null | wc -l)
          echo "Total backups: $BACKUP_COUNT"
          
          # Keep only last 30
          if [ "$BACKUP_COUNT" -gt 30 ]; then
            TO_DELETE=$((BACKUP_COUNT - 30))
            echo "Deleting $TO_DELETE old backups..."
            
            ls -dt */ | tail -n +31 | while read dir; do
              echo "Removing: $dir"
              rm -rf "$dir"
            done
            
            git config user.name "Cleanup Bot"
            git config user.email "cleanup@recepio.io"
            git add -A
            git commit -m "Cleanup: removed $TO_DELETE old backups"
            git push
            
            echo "✅ Cleanup complete"
          else
            echo "✅ No cleanup needed ($BACKUP_COUNT <= 30)"
          fi

  notify-success:
    needs: backup-and-push
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Send success notification
        uses: 8398a7/action-slack@v3
        with:
          status: 'success'
          text: |
            ✅ Recepio Backup SUCCESS
           ━━━━━━━━━━━━━━━━━━━━
            📦 Type: ${{ github.event.inputs.backup_type }}
            🕐 Time: ${{ github.event.repository.updated_at }}
            🔗 View: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Log success
        run: |
          echo "✅ Backup completed successfully at $(date -Iseconds)"

  notify-failure:
    needs: backup-and-push
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Send failure alert
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          text: |
            🚨 CRITICAL: Recepio Backup FAILED
           ━━━━━━━━━━━━━━━━━━━━━━━━━━━
            ❌ Backup Type: ${{ github.event.inputs.backup_type }}
            🕐 Time: $(date -Iseconds)
            🔗 Logs: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
            
            ⚠️ ACTION REQUIRED: Check logs immediately!
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Backup Failed - ' + new Date().toISOString(),
              body: `
            ## Backup Failure Details
            
            - **Run ID**: ${{ github.run_id }}
            - **Type**: ${{ github.event.inputs.backup_type }}
            - **Time**: ${new Date().toISOString()}
            - **Logs**: ${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }}
            
            ## Action Required
            1. Check the workflow logs
            2. Verify database connectivity
            3. Verify GPG key is valid
            4. Manually trigger backup if needed
              `,
              labels: ['backup', 'critical', 'automated']
            })
