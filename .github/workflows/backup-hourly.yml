name: Hourly Full Backup

on:
  schedule:
    # كل ساعة - "بدي كل ساعه اجباري"
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force backup even if no changes'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  backup-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 63.181.126.178 >> ~/.ssh/known_hosts

      - name: Get timestamp
        id: timestamp
        run: echo "TIMESTAMP=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create backup directory
        run: |
          mkdir -p /tmp/backup

      - name: Backup PostgreSQL Database
        run: |
          echo "=== Backing up Database ==="
          ssh ubuntu@63.181.126.178 "sudo docker exec recepio-postgres pg_dump -U recepio recepio" > /tmp/backup/database.sql

          # ضغط
          gzip /tmp/backup/database.sql

          # عرض الحجم
          ls -lh /tmp/backup/database.sql.gz

      - name: Backup Nginx Configs
        run: |
          echo "=== Backing up Nginx ==="
          ssh ubuntu@63.181.126.178 "sudo cat /etc/nginx/sites-available/api.recepio.io" > /tmp/backup/nginx-api.conf
          ssh ubuntu@63.181.126.178 "sudo cat /etc/nginx/sites-available/app.recepio.io" > /tmp/backup/nginx-app.conf
          ssh ubuntu@63.181.126.178 "sudo cat /etc/nginx/sites-available/admin.recepio.io" > /tmp/backup/nginx-admin.conf
          ssh ubuntu@63.181.126.178 "sudo cat /etc/nginx/nginx.conf" > /tmp/backup/nginx-main.conf

      - name: Backup Systemd Services
        run: |
          echo "=== Backing up Systemd ==="
          ssh ubuntu@63.181.126.178 "sudo cat /etc/systemd/system/recepio-backup.service" > /tmp/backup/recepio-backup.service
          ssh ubuntu@63.181.126.178 "sudo cat /etc/systemd/system/recepio-backup.timer" > /tmp/backup/recepio-backup.timer

      - name: Backup Docker Compose
        run: |
          echo "=== Backing up Docker Compose ==="
          ssh ubuntu@63.181.126.178 "sudo cat /opt/recepio/recepio-app-v2/infra/docker-compose.yml" > /tmp/backup/docker-compose.yml
          ssh ubuntu@63.181.126.178 "sudo cat /opt/recepio/recepio-app-v2/infra/docker-compose.prod.yml" > /tmp/backup/docker-compose.prod.yml
          ssh ubuntu@63.181.126.178 "sudo cat /opt/recepio/recepio-app-v2/infra/docker-compose.monitoring.yml" > /tmp/backup/docker-compose.monitoring.yml

      - name: Backup .env structure (without secrets)
        run: |
          echo "=== Backing up .env structure ==="
          ssh ubuntu@63.181.126.178 "sudo cat /opt/recepio/recepio-app-v2/infra/.env.example 2>/dev/null || echo '# No .env.example'" > /tmp/backup/env.example

      - name: Backup Monitoring Stack
        run: |
          echo "=== Backing up Monitoring ==="
          mkdir -p /tmp/backup/monitoring
          
          # Prometheus config + rules
          ssh ubuntu@63.181.126.178 "sudo docker exec recepio-prometheus cat /etc/prometheus/prometheus.yml 2>/dev/null || echo 'No prometheus config'" > /tmp/backup/monitoring/prometheus.yml
          
          # Prometheus alerting rules
          ssh ubuntu@63.181.126.178 "
            sudo docker exec recepio-prometheus find /etc/prometheus/rules -name '*.yml' -exec cat {} \; 2>/dev/null || echo 'No rules'
          " > /tmp/backup/monitoring/prometheus-rules.yml
          
          # Alertmanager config
          ssh ubuntu@63.181.126.178 "sudo docker exec recepio-alertmanager cat /etc/alertmanager/alertmanager.yml 2>/dev/null || echo 'No alertmanager config'" > /tmp/backup/monitoring/alertmanager.yml
          
          ls -lh /tmp/backup/monitoring/

      - name: Backup Telegram Bot
        run: |
          echo "=== Backing up Telegram Bot ==="
          mkdir -p /tmp/backup/telegram
          
          # Telegram bot script
          ssh ubuntu@63.181.126.178 "sudo docker exec recepio-telegram-bot cat /app/telegram_bot.py 2>/dev/null || echo 'No script'" > /tmp/backup/telegram/telegram_bot.py
          
          # Requirements
          ssh ubuntu@63.181.126.178 "sudo docker exec recepio-telegram-bot cat /app/requirements.txt 2>/dev/null || echo 'No requirements'" > /tmp/backup/telegram/requirements.txt
          
          ls -lh /tmp/backup/telegram/

      - name: Backup System Configs
        run: |
          echo "=== Backing up System Configs ==="
          mkdir -p /tmp/backup/system
          
          # UFW firewall rules
          ssh ubuntu@63.181.126.178 "
            sudo iptables-save 2>/dev/null || sudo ufw status numbered 2>/dev/null || echo 'No firewall rules'
          " > /tmp/backup/system/firewall.rules
          
          # SSH config
          ssh ubuntu@63.181.126.178 "
            echo '=== sshd_config ==='
            sudo cat /etc/ssh/sshd_config 2>/dev/null
            echo ''
            echo '=== sshd_config.d ==='
            sudo ls -la /etc/ssh/sshd_config.d/ 2>/dev/null || echo 'No sshd_config.d'
          " > /tmp/backup/system/sshd_config
          
          # Cron jobs
          ssh ubuntu@63.181.126.178 "
            echo '=== /etc/crontab ==='
            sudo cat /etc/crontab 2>/dev/null
            echo ''
            echo '=== /etc/cron.d ==='
            sudo ls /etc/cron.d/ 2>/dev/null | while read f; do
              echo \"--- \$f ---\"
              sudo cat /etc/cron.d/\$f 2>/dev/null
            done
            echo ''
            echo '=== User crontabs ==='
            sudo ls /var/spool/cron/crontabs/ 2>/dev/null | while read u; do
              echo \"--- \$u ---\"
              sudo cat /var/spool/cron/crontabs/\$u 2>/dev/null
            done || echo 'No user crontabs'
          " > /tmp/backup/system/cron-jobs
          
          ls -lh /tmp/backup/system/

      - name: Backup Chatwoot Redis
        run: |
          echo "=== Backing up Chatwoot Redis ==="
          mkdir -p /tmp/backup/chatwoot-redis
          
          # Redis dump
          ssh ubuntu@63.181.126.178 "
            sudo docker exec chatwoot-redis redis-cli BGSAVE 2>/dev/null || true
            sleep 2
            sudo docker exec chatwoot-redis cat /data/dump.rdb 2>/dev/null || echo 'No dump'
          " > /tmp/backup/chatwoot-redis/dump.rdb
          
          ls -lh /tmp/backup/chatwoot-redis/

      - name: Create archive
        run: |
          echo "=== Creating Archive ==="
          cd /tmp/backup

          # إنشاء tarball
          tar -czf ../backup_${{ steps.timestamp.outputs.TIMESTAMP }}.tar.gz *

          # عرض الحجم
          ls -lh ../backup_${{ steps.timestamp.outputs.TIMESTAMP }}.tar.gz

      - name: Import GPG Key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Encrypt backup
        run: |
          echo "=== Encrypting Backup ==="
          gpg --batch --yes --trust-model always \
              --encrypt --recipient backup@recepio.io \
              --output /tmp/backup_${{ steps.timestamp.outputs.TIMESTAMP }}.tar.gz.gpg \
              /tmp/backup_${{ steps.timestamp.outputs.TIMESTAMP }}.tar.gz

          ls -lh /tmp/backup_${{ steps.timestamp.outputs.TIMESTAMP }}.tar.gz.gpg

      - name: Checkout backups repo
        uses: actions/checkout@v4
        with:
          repository: RecepioHQ/recepio-backups
          token: ${{ secrets.GITHUB_TOKEN }}
          path: backups-repo

      - name: Commit encrypted backup
        run: |
          cd backups-repo

          # إنشاء مجلد للساعة
          HOUR=$(date +%Y%m%d_%H)
          mkdir -p "hourly/$HOUR"

          # نسخ الملف المشفر
          cp /tmp/backup_${{ steps.timestamp.outputs.TIMESTAMP }}.tar.gz.gpg "hourly/$HOUR/"

          # إنشاء manifest للنسخة
          cat > "hourly/$HOUR/MANIFEST.md" << EOF
          # Backup - ${{ steps.timestamp.outputs.TIMESTAMP }}

          **Timestamp:** $(date -Iseconds)
          **Trigger:** ${{ github.event_name }}

          ## Contents (100% Coverage)
          
          ### Database & Data
          - PostgreSQL Database (recepio)
          - Chatwoot Redis dump
          
          ### Web & Proxy
          - Nginx configs (api, app, admin)
          
          ### Container Orchestration
          - Docker Compose files (dev, prod, monitoring)
          - Systemd services + timers
          
          ### Monitoring Stack
          - Prometheus config + alerting rules
          - Alertmanager config
          
          ### Integrations
          - Telegram Bot script + requirements
          
          ### System Configs
          - UFW Firewall rules
          - SSH sshd_config
          - Cron jobs (system + user)
          
          ### Environment
          - .env structure example

          ## Encrypted File
          - backup_${{ steps.timestamp.outputs.TIMESTAMP }}.tar.gz.gpg

          ## To Restore
          \`\`\`bash
          gpg --decrypt backup_${{ steps.timestamp.outputs.TIMESTAMP }}.tar.gz.gpg | tar -xzf -
          \`\`\`
          EOF

          # Git config
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # إضافة
          git add -A

          # Commit
          git commit -m "Hourly backup - ${{ steps.timestamp.outputs.TIMESTAMP }}" || echo "No changes"

          # Push
          git push origin master

      - name: Cleanup old backups (keep last 24 hours)
        run: |
          cd backups-repo

          # حذف النسخ الأقدم من 24 ساعة
          find hourly -type d -mtime +1 -exec rm -rf {} + 2>/dev/null || true

          git add -A
          git commit -m "Cleanup old hourly backups" || echo "No cleanup needed"
          git push origin master

      - name: Notify success
        run: |
          echo "✅ Hourly backup completed: ${{ steps.timestamp.outputs.TIMESTAMP }}"
          echo "📦 Location: https://github.com/RecepioHQ/recepio-backups/tree/master/hourly"

  backup-complete:
    needs: backup-database
    runs-on: ubuntu-latest

    steps:
      - name: Summary
        run: |
          echo "============================================"
          echo "✅ HOURLY BACKUP COMPLETE"
          echo "============================================"
          echo ""
          echo "Timestamp: $(date -Iseconds)"
          echo "Repository: https://github.com/RecepioHQ/recepio-backups"
          echo ""
          echo "All backups encrypted with GPG RSA-4096"
          echo "Retention: 24 hours"
          echo "============================================"
